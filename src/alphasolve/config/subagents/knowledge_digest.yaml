version: 1
agent:
  name: knowledge_digest
  prompt_path: ../../prompts/knowledge_digest.md
  model_config: GENERATOR_CONFIG
  max_turns: 40
  when_to_use: Incrementally update the knowledge wiki after each subagent trace.
  tools:
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - Bash
    - Agent
    - GetCurrentTime
  tool_parameters:
    Read:
      path:
        pattern: "^knowledge/[A-Za-z0-9][A-Za-z0-9._-]*\\.md$"
    Write:
      path:
        pattern: "^knowledge/[A-Za-z0-9][A-Za-z0-9._-]*\\.md$"
    Edit:
      path:
        pattern: "^knowledge/[A-Za-z0-9][A-Za-z0-9._-]*\\.md$"
    Glob:
      path:
        default: knowledge
        enum:
          - knowledge
          - knowledge/
      max_results:
        default: 100
        minimum: 1
        maximum: 500
    Grep:
      path:
        default: knowledge
        pattern: "^knowledge(?:/[A-Za-z0-9][A-Za-z0-9._-]*\\.md)?$"
      max_results:
        default: 20
        minimum: 1
        maximum: 100
      context_lines:
        default: 1
        minimum: 0
        maximum: 3
    Agent:
      type:
        enum:
          - compute_subagent
          - reasoning_subagent
