version: 1
agent:
  name: verifier
  system_prompt_path: ../../prompts/verifier.md
  model_config: VERIFIER_CONFIG
  max_turns: 80
  tools:
    - read_file
    - get_child_item
    - search_files
    - grep
    - agent
  tool_parameters:
    agent:
      type:
        enum:
          - compute_subagent
          - numerical_experiment_subagent
          - reasoning_subagent
