version: 1
agent:
  name: reviser
  system_prompt_path: ../../prompts/reviser.md
  model_config: REVISER_CONFIG
  max_turns: 80
  tools:
    - read_file
    - get_child_item
    - search_files
    - grep
    - write_file
    - agent
  tool_parameters:
    agent:
      type:
        enum:
          - compute_subagent
          - numerical_experiment_subagent
          - reasoning_subagent
