version: 1
agent:
  name: reviser
  system_prompt_path: ../../prompts/reviser.md
  model_config: REVISER_CONFIG
  max_turns: 80
  tools:
    - Read
    - Glob
    - Grep
    - Write
    - Agent
    - GetCurrentTime
  tool_parameters:
    Agent:
      type:
        enum:
          - compute_subagent
          - numerical_experiment_subagent
          - reasoning_subagent
