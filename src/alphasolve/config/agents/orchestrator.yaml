version: 1
agent:
  name: orchestrator
  system_prompt_path: ../../prompts/orchestrator.md
  model_config: ORCHESTRATOR_CONFIG
  max_turns: 80
  tools:
    - Grep
    - Glob
    - Read
    - Agent
    - TaskOutput
    - Review
    - GetCurrentTime
  tool_parameters:
    Agent:
      hint:
        type: string
        maxLength: 4000
    TaskOutput:
      seconds:
        type: number
        minimum: 0
        maximum: 3600
