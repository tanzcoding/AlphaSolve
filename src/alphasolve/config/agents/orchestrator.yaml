version: 1
agent:
  name: orchestrator
  system_prompt_path: ../../prompts/orchestrator.md
  model_config: ORCHESTRATOR_CONFIG
  max_turns: 80
  tools:
    - grep
    - search_files
    - get_child_item
    - read_file
    - spawn_worker
    - wait
  tool_parameters:
    spawn_worker:
      hint:
        type: string
        maxLength: 4000
    wait:
      seconds:
        type: number
        minimum: 0
        maximum: 3600
