version: 1
agent:
  name: orchestrator
  system_prompt_path: ../../prompts/orchestrator.md
  model_config: ORCHESTRATOR_CONFIG
  max_turns: 80
  tools:
    - Grep
    - Glob
    - Read
    - ListDir
    - MakeDir
    - Rename
    - Agent
    - TaskOutput
    - Review
    - GetCurrentTime
  tool_parameters:
    MakeDir:
      path:
        pattern: "^verified_propositions(?:/[A-Za-z0-9][A-Za-z0-9._-]*)+/?$"
    Rename:
      old_path:
        pattern: "^verified_propositions/(?:[A-Za-z0-9][A-Za-z0-9._-]*/)*[A-Za-z0-9][A-Za-z0-9._-]*(?:\\.md)?/?$"
      new_path:
        pattern: "^verified_propositions/(?:[A-Za-z0-9][A-Za-z0-9._-]*/)*[A-Za-z0-9][A-Za-z0-9._-]*(?:\\.md)?/?$"
    Agent:
      hint:
        type: string
        maxLength: 4000
    TaskOutput:
      seconds:
        type: number
        minimum: 0
        maximum: 3600
