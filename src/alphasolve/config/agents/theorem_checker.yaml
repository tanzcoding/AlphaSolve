version: 1
agent:
  name: theorem_checker
  system_prompt_path: ../../prompts/theorem_checker.md
  model_config: VERIFIER_CONFIG
  max_turns: 60
  tools:
    - Read
    - ListDir
    - Glob
    - Grep
    - Agent
    - GetCurrentTime
  tool_parameters:
    ListDir:
      path:
        default: verified_propositions
        enum:
          - verified_propositions
          - verified_propositions/
    Agent:
      type:
        enum:
          - compute_subagent
          - numerical_experiment_subagent
          - reasoning_subagent
